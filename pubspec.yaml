name: grolin_rider_app
description: "Grolin Rider App - delivery partner app for the Grolin grocery platform."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (Riverpod 3, manual provider declarations).
  flutter_riverpod: ^3.2.1

  # Routing
  go_router: ^17.2.3

  # Networking and realtime
  dio: ^5.9.2
  socket_io_client: ^3.1.4

  # Maps, location, external nav
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^9.1.4
  http: ^1.2.2
  geolocator: ^14.0.1
  url_launcher: ^6.3.2

  # Storage / device / connectivity
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^7.1.1
  permission_handler: ^12.0.1
  device_info_plus: ^13.1.0

  # Background work (periodic location heartbeat when app is backgrounded)
  workmanager: ^0.9.0

  # Imaging
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.4.0

  # File system utilities
  path_provider: ^2.1.5
  path: ^1.9.1

  # Push / notifications
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0

  # Formatting / UI helpers
  package_info_plus: ^10.1.0
  intl: ^0.20.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Property-based testing and mocking
  glados: ^1.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
