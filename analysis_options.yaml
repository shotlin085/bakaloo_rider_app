# Analysis options for the Grolin Rider App.
#
# Strict-mode analyzer settings combined with flutter_lints/recommended.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat unawaited futures and missing required params as errors.
    unawaited_futures: error
    missing_required_param: error
    # Surface dead code as errors so the build catches stale branches.
    dead_code: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

linter:
  rules:
    # Style: prefer single quotes consistently.
    prefer_single_quotes: true
    # Const everywhere we can, per the performance checklist in the spec.
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    # Public APIs should declare return types explicitly.
    always_declare_return_types: true
    # Async hygiene.
    avoid_void_async: true
    discarded_futures: true
    unawaited_futures: true
    # Naming.
    camel_case_types: true
    non_constant_identifier_names: true
    # Equality and value types.
    avoid_equals_and_hash_code_on_mutable_classes: true
